<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridg</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif; background: #0e0e0e; }

    .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.5) !important; }

    .btn { cursor: pointer; border: none; transition: filter 0.15s ease, transform 0.12s ease; }
    .btn:hover { filter: brightness(1.12); }
    .btn:active { transform: scale(0.97); }

    .cart-panel { transition: transform 0.32s cubic-bezier(0.4,0,0.2,1); }
    .tab-btn    { transition: color 0.15s, border-color 0.15s; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── Assets ─────────────────────────────────────────────────────── */
const A = {
  imgs: [
    "https://www.figma.com/api/mcp/asset/234cdbb1-90e4-4675-86f2-838b12bc4233",
    "https://www.figma.com/api/mcp/asset/9bcb9b2e-995f-4e8f-a288-c9c55628451a",
    "https://www.figma.com/api/mcp/asset/1c88c619-ac3a-4f74-9bc4-8fb45965be0b",
  ],
  preorderImgs: [
    "https://www.figma.com/api/mcp/asset/72ef5439-e34c-4738-b169-16847caa828b",
    "https://www.figma.com/api/mcp/asset/234cdbb1-90e4-4675-86f2-838b12bc4233",
    "https://www.figma.com/api/mcp/asset/9bcb9b2e-995f-4e8f-a288-c9c55628451a",
    "https://www.figma.com/api/mcp/asset/1c88c619-ac3a-4f74-9bc4-8fb45965be0b",
  ],
};

/* ── Data ────────────────────────────────────────────────────────── */
const GAMES = [
  {
    id: 1, imgIdx: 0,
    name: "Trend Quiz",
    desc: "Answer 5 quick questions about your workout style to unlock a pre-order slot.",
    cta: "RESUME", ctaColor: "#d41935",
    progress: 8,
  },
  {
    id: 2, imgIdx: 1,
    name: "Outfit Builder",
    desc: "Mix and match pieces from the new collection. Complete your look to earn an unlock.",
    cta: "PLAY", ctaColor: "#d41935",
    progress: null,
  },
  {
    id: 3, imgIdx: 2,
    name: "Color Match",
    desc: "Pair our seasonal palette swatches in the right order to claim your pre-order.",
    cta: "PLAY", ctaColor: "#d41935",
    progress: null,
  },
];

const PREORDERS = [
  {
    id: 1, imgIdx: 0,
    name: "Align™ High-Rise Pant 25\"",
    color: "Noir Black", size: "4", price: 128,
    unlocked: true,
    tag: "Unlocked via Style Predictor",
  },
  {
    id: 2, imgIdx: 1,
    name: "Swiftly Tech Long-Sleeve",
    color: "Ivory White", size: "S", price: 88,
    unlocked: true, progress: 8,
    tag: "Unlocked via Trend Quiz",
  },
  {
    id: 3, imgIdx: 2,
    name: "Define Jacket Nulu",
    color: "Sage Green", size: "M", price: 138,
    unlocked: false,
    tag: "Play Outfit Builder to unlock",
  },
  {
    id: 4, imgIdx: 3,
    name: "Wunder Train Tight 25\"",
    color: "Deep Navy", size: "6", price: 98,
    unlocked: false,
    tag: "Play Color Match to unlock",
  },
];

/* ── Design tokens ───────────────────────────────────────────────── */
const C = {
  bg:        "#0e0e0e",
  panel:     "#161616",
  card:      "#1f1f1f",
  cardHover: "#252525",
  border:    "rgba(255,255,255,0.07)",
  text1:     "#f0f0f0",
  text2:     "#888",
  text3:     "#555",
  green:     "#6a8f4a",
  greenDim:  "rgba(106,143,74,0.18)",
  red:       "#d41935",
};

/* ── Icons ───────────────────────────────────────────────────────── */
function IconLockSm() {
  return (
    <svg width="28" height="34" viewBox="0 0 28 34" fill="none">
      <rect x="1" y="13" width="26" height="20" rx="5" fill="rgba(255,255,255,0.12)"/>
      <path d="M7 13V9C7 5.69 9.69 3 13 3C16.31 3 19 5.69 19 9V13"
            stroke="rgba(255,255,255,0.12)" strokeWidth="3.5" strokeLinecap="round" fill="none"/>
      <circle cx="13.5" cy="23" r="2.8" fill="rgba(255,255,255,0.4)"/>
      <rect x="11.5" y="23" width="4" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
    </svg>
  );
}

function IconLock() {
  return (
    <svg width="40" height="48" viewBox="0 0 40 48" fill="none">
      <rect x="2" y="19" width="36" height="27" rx="7" fill="rgba(255,255,255,0.1)"/>
      <path d="M9 19V13C9 7.48 13.48 3 19 3C24.52 3 29 7.48 29 13V19"
            stroke="rgba(255,255,255,0.1)" strokeWidth="4.5" strokeLinecap="round" fill="none"/>
      <circle cx="19.5" cy="33" r="3.5" fill="rgba(255,255,255,0.35)"/>
      <rect x="17" y="33" width="5" height="6.5" rx="2.5" fill="rgba(255,255,255,0.35)"/>
    </svg>
  );
}

function IconCart() {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
  );
}

function IconGamepad() {
  return (
    <svg width="16" height="13" viewBox="0 0 20 14" fill="none"
         stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
      <rect x="1" y="1" width="18" height="12" rx="4"/>
      <path d="M6 7h4M8 5v4"/>
      <circle cx="14" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      <circle cx="16.5" cy="9" r="1" fill="currentColor" stroke="none"/>
    </svg>
  );
}

function IconBox() {
  return (
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6">
      <rect x="1" y="1" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9.5" y="1" width="5.5" height="5.5" rx="1.2"/>
      <rect x="1" y="9.5" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1.2"/>
    </svg>
  );
}

function IconClose() {
  return (
    <svg width="15" height="15" viewBox="0 0 18 18" fill="none"
         stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
      <line x1="2" y1="2" x2="16" y2="16"/>
      <line x1="16" y1="2" x2="2" y2="16"/>
    </svg>
  );
}

/* ── Game Row ────────────────────────────────────────────────────── */
function GameRow({ game, index }) {
  return (
    <div className="card" style={{
      background: C.card,
      borderRadius: 14,
      border: `1px solid ${C.border}`,
      display: "flex",
      alignItems: "center",
      gap: 18,
      padding: "14px 20px 14px 16px",
      boxShadow: "0 2px 10px rgba(0,0,0,0.3)",
    }}>
      {/* Step number */}
      <div style={{
        width: 26, height: 26, borderRadius: "50%",
        background: "rgba(255,255,255,0.06)", flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 800, color: C.text3,
      }}>
        {index + 1}
      </div>

      {/* Thumbnail */}
      <div style={{ position: "relative", width: 78, height: 78, flexShrink: 0 }}>
        <img src={A.imgs[game.imgIdx]} alt={game.name}
             style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: 10, opacity: 0.12 }} />
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <IconLockSm />
        </div>
      </div>

      {/* Info */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ fontSize: 14, fontWeight: 800, color: C.text1, letterSpacing: "0.2px" }}>{game.name}</p>
        <p style={{ fontSize: 12, color: C.text2, marginTop: 4, lineHeight: 1.5 }}>{game.desc}</p>
        {game.progress !== null && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 9 }}>
            <div style={{ flex: 1, height: 4, background: C.greenDim, borderRadius: 3 }}>
              <div style={{ height: "100%", width: `${game.progress}%`, background: C.green, borderRadius: 3 }} />
            </div>
            <span style={{ fontSize: 11, fontWeight: 800, color: C.green, whiteSpace: "nowrap" }}>{game.progress}% done</span>
          </div>
        )}
      </div>

      {/* CTA */}
      <button className="btn" style={{
        flexShrink: 0,
        background: game.ctaColor, color: "white",
        borderRadius: 10, padding: "10px 26px",
        fontSize: 12, fontWeight: 800, letterSpacing: "1.8px",
      }}>
        {game.cta}
      </button>
    </div>
  );
}

/* ── Pre-order Card ──────────────────────────────────────────────── */
function PreorderCard({ item, inCart, onAdd, onRemove }) {
  return (
    <div className="card" style={{
      flex: "1 1 0", minWidth: 0,
      background: C.card,
      border: `1px solid ${C.border}`,
      borderRadius: 18,
      overflow: "hidden",
      display: "flex", flexDirection: "column",
      boxShadow: "0 4px 18px rgba(0,0,0,0.3)",
      opacity: item.unlocked ? 1 : 0.65,
    }}>
      <div style={{ position: "relative", height: 180, overflow: "hidden", flexShrink: 0 }}>
        <img src={A.preorderImgs[item.imgIdx]} alt={item.name}
             style={{ width: "100%", height: "100%", objectFit: "cover", opacity: item.unlocked ? 0.75 : 0.1 }} />
        {!item.unlocked && (
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <IconLock />
            <span style={{ fontSize: 10, color: C.text2, fontWeight: 700, letterSpacing: "1px" }}>PLAY TO UNLOCK</span>
          </div>
        )}
        {item.progress !== undefined && item.unlocked && (
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "0 12px 8px" }}>
            <div style={{ height: 3, background: "rgba(255,255,255,0.15)", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${item.progress}%`, background: C.green }} />
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: "14px 16px 16px", flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
        <div>
          <p style={{ fontSize: 13, fontWeight: 800, color: C.text1 }}>{item.name}</p>
          <p style={{ fontSize: 11, color: C.text3, marginTop: 3 }}>{item.color} · Size {item.size}</p>
        </div>
        <p style={{ fontSize: 10.5, color: item.unlocked ? C.green : C.text3, fontWeight: 600 }}>{item.tag}</p>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "auto" }}>
          <span style={{ fontSize: 16, fontWeight: 800, color: C.text1 }}>${item.price}</span>
          {item.unlocked ? (
            inCart ? (
              <button className="btn" onClick={() => onRemove(item.id)}
                      style={{ background: "rgba(255,255,255,0.08)", color: C.text2, borderRadius: 9, padding: "7px 13px", fontSize: 10.5, fontWeight: 800, letterSpacing: "0.8px" }}>
                REMOVE
              </button>
            ) : (
              <button className="btn" onClick={() => onAdd(item)}
                      style={{ background: C.text1, color: "#111", borderRadius: 9, padding: "7px 13px", fontSize: 10.5, fontWeight: 800, letterSpacing: "0.8px" }}>
                ADD TO CART
              </button>
            )
          ) : (
            <span style={{ fontSize: 10.5, color: C.text3 }}>Locked</span>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Cart Sidebar ────────────────────────────────────────────────── */
function CartSidebar({ open, items, onClose, onRemove, onUpdateQty }) {
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  return (
    <>
      {open && (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 40, background: "rgba(0,0,0,0.6)" }} />
      )}
      <div className="cart-panel" style={{
        position: "fixed", right: 0, top: 0, bottom: 0, zIndex: 50,
        width: 360, background: "#141414",
        borderLeft: `1px solid ${C.border}`,
        boxShadow: "-4px 0 48px rgba(0,0,0,0.6)",
        display: "flex", flexDirection: "column",
        transform: open ? "translateX(0)" : "translateX(100%)",
      }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "22px 24px 20px", borderBottom: `1px solid ${C.border}` }}>
          <div>
            <p style={{ fontSize: 15, fontWeight: 800, letterSpacing: "1.5px", color: C.text1 }}>YOUR CART</p>
            <p style={{ fontSize: 11.5, color: C.text3, marginTop: 2 }}>
              {items.length === 0 ? "Empty" : `${items.reduce((s,i)=>s+i.qty,0)} item${items.reduce((s,i)=>s+i.qty,0)!==1?"s":""}`}
            </p>
          </div>
          <button className="btn" onClick={onClose}
                  style={{ background: "rgba(255,255,255,0.07)", borderRadius: 8, padding: 8, color: C.text2, display: "flex" }}>
            <IconClose />
          </button>
        </div>

        {/* Items */}
        <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px", display: "flex", flexDirection: "column", gap: 16 }}>
          {items.length === 0 ? (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14 }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke={C.text3} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
              </svg>
              <div style={{ textAlign: "center" }}>
                <p style={{ fontSize: 13, color: C.text2, fontWeight: 700 }}>Nothing here yet</p>
                <p style={{ fontSize: 11.5, color: C.text3, marginTop: 5, lineHeight: 1.6 }}>Win a mini-game to unlock items,<br/>then pre-order them here.</p>
              </div>
            </div>
          ) : (
            items.map(item => (
              <div key={item.id} style={{ display: "flex", gap: 14, paddingBottom: 16, borderBottom: `1px solid ${C.border}` }}>
                <img src={A.preorderImgs[item.imgIdx]} alt={item.name}
                     style={{ width: 68, height: 68, borderRadius: 10, objectFit: "cover", opacity: 0.8, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 13, fontWeight: 700, color: C.text1, lineHeight: 1.3 }}>{item.name}</p>
                  <p style={{ fontSize: 11, color: C.text3, marginTop: 3 }}>{item.color} · Size {item.size}</p>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
                      <button className="btn" style={{ width: 30, height: 30, fontSize: 16, background: "rgba(255,255,255,0.05)", color: C.text2, display: "flex", alignItems: "center", justifyContent: "center" }}
                              onClick={() => item.qty > 1 ? onUpdateQty(item.id, item.qty-1) : onRemove(item.id)}>−</button>
                      <span style={{ width: 26, textAlign: "center", fontSize: 13, fontWeight: 700, color: C.text1 }}>{item.qty}</span>
                      <button className="btn" style={{ width: 30, height: 30, fontSize: 16, background: "rgba(255,255,255,0.05)", color: C.text2, display: "flex", alignItems: "center", justifyContent: "center" }}
                              onClick={() => onUpdateQty(item.id, item.qty+1)}>+</button>
                    </div>
                    <span style={{ fontSize: 14, fontWeight: 800, color: C.text1 }}>${(item.price * item.qty).toFixed(0)}</span>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>

        {/* Footer */}
        {items.length > 0 && (
          <div style={{ padding: "18px 24px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 13, color: C.text2 }}>Subtotal</span>
              <span style={{ fontSize: 16, fontWeight: 800, color: C.text1 }}>${total.toFixed(0)}</span>
            </div>
            <p style={{ fontSize: 11, color: C.text3, marginBottom: 14 }}>Shipping & taxes calculated at checkout</p>
            <button className="btn" style={{ width: "100%", background: C.text1, color: "#111", borderRadius: 12, height: 50, fontSize: 13, fontWeight: 800, letterSpacing: "2px" }}>
              CHECKOUT
            </button>
          </div>
        )}
      </div>
    </>
  );
}

/* ── App ─────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab]             = useState("play");
  const [cartOpen, setCartOpen]   = useState(false);
  const [cartItems, setCartItems] = useState([]);

  const addToCart      = (item) => {
    setCartItems(prev => prev.find(i => i.id === item.id) ? prev : [...prev, { ...item, qty: 1 }]);
    setCartOpen(true);
  };
  const removeFromCart = (id)      => setCartItems(p => p.filter(i => i.id !== id));
  const updateQty      = (id, qty) => setCartItems(p => p.map(i => i.id === id ? { ...i, qty } : i));
  const cartCount = cartItems.reduce((s, i) => s + i.qty, 0);

  return (
    <div style={{ position: "relative", width: "100vw", height: "100vh", overflow: "hidden", background: C.bg }}>

      {/* Cart */}
      <CartSidebar open={cartOpen} items={cartItems} onClose={() => setCartOpen(false)}
                   onRemove={removeFromCart} onUpdateQty={updateQty} />

      {/* ── Header ── */}
      <header style={{
        position: "absolute", top: 0, left: 0, right: 0, zIndex: 10,
        display: "flex", alignItems: "center",
        height: 60, padding: "0 28px",
        borderBottom: `1px solid ${C.border}`,
      }}>
        {/* Left spacer (mirrors right side for centering) */}
        <div style={{ flex: 1 }} />

        {/* Center: Bridg wordmark */}
        <span style={{
          fontSize: 22, fontWeight: 900, letterSpacing: "5px",
          color: C.text1, textTransform: "uppercase",
          position: "absolute", left: "50%", transform: "translateX(-50%)",
        }}>
          bridg
        </span>

        {/* Right: Account + Cart */}
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 12 }}>
          {/* Account */}
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{
              width: 30, height: 30, borderRadius: "50%",
              background: "rgba(255,255,255,0.1)",
              border: `1px solid ${C.border}`,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <span style={{ color: C.text2, fontSize: 12, fontWeight: 800 }}>K</span>
            </div>
            <span style={{ color: C.text2, fontSize: 13, fontWeight: 600, letterSpacing: "1px" }}>Karen</span>
          </div>

          <div style={{ width: 1, height: 20, background: C.border }} />

          {/* Cart */}
          <button className="btn" onClick={() => setCartOpen(o => !o)}
                  style={{
                    position: "relative", display: "flex", alignItems: "center", gap: 7,
                    background: "rgba(255,255,255,0.07)",
                    border: `1px solid ${C.border}`,
                    borderRadius: 9, padding: "7px 14px",
                    color: C.text2, fontSize: 12, fontWeight: 700, letterSpacing: "1px",
                  }}>
            <IconCart />
            Cart
            {cartCount > 0 && (
              <div style={{
                position: "absolute", top: -7, right: -7,
                background: C.red, color: "white",
                width: 17, height: 17, borderRadius: "50%",
                fontSize: 9, fontWeight: 800,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>{cartCount}</div>
            )}
          </button>
        </div>
      </header>

      {/* ── Main Panel ── */}
      <main style={{
        position: "absolute", left: 20, right: 20, top: 74, bottom: 18,
        background: C.panel,
        border: `1px solid ${C.border}`,
        borderRadius: 20,
        display: "flex", flexDirection: "column",
        overflow: "hidden",
        boxShadow: "0 8px 60px rgba(0,0,0,0.5)",
      }}>

        {/* Panel heading */}
        <div style={{ padding: "22px 32px 0", display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
          <div>
            <p style={{ fontSize: 10, fontWeight: 700, color: C.text3, letterSpacing: "2.5px", marginBottom: 5 }}>JANUARY 2026</p>
            <h1 style={{ fontSize: 40, fontWeight: 900, letterSpacing: "5px", color: C.text1, lineHeight: 1 }}>JANUARY</h1>
          </div>
          <div style={{ textAlign: "right", paddingBottom: 3 }}>
            <p style={{ fontSize: 11, color: C.text3, letterSpacing: "0.3px" }}>{GAMES.length} games available</p>
            <p style={{ fontSize: 11, color: C.text3, marginTop: 2, letterSpacing: "0.3px" }}>{PREORDERS.filter(p=>p.unlocked).length} items unlocked</p>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 24, padding: "0 32px", marginTop: 14, borderBottom: `1px solid ${C.border}` }}>
          {[
            { key: "play",     label: "PLAY",      icon: <IconGamepad /> },
            { key: "preorder", label: "PRE-ORDER",  icon: <IconBox /> },
          ].map(t => (
            <button key={t.key} className="btn tab-btn"
                    onClick={() => setTab(t.key)}
                    style={{
                      display: "flex", alignItems: "center", gap: 7,
                      background: "none", paddingBottom: 10, paddingTop: 4,
                      fontSize: 12, fontWeight: 800, letterSpacing: "1.5px",
                      color: tab === t.key ? C.text1 : C.text3,
                      borderBottom: tab === t.key ? `2px solid ${C.text1}` : "2px solid transparent",
                      marginBottom: -1,
                    }}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>

        {/* Helper */}
        <div style={{ padding: "10px 32px 0" }}>
          <p style={{ fontSize: 11.5, color: C.text3 }}>
            {tab === "play"
              ? "Complete mini-games to unlock exclusive items and influence what drops next."
              : "Items unlocked through gameplay. Add them to your cart to secure your pre-order."}
          </p>
        </div>

        {/* Content */}
        <div style={{
          flex: 1, padding: "14px 28px 0",
          display: "flex",
          flexDirection: tab === "play" ? "column" : "row",
          gap: tab === "play" ? 11 : 14,
          overflow: "hidden",
        }}>
          {tab === "play"
            ? GAMES.map((g, i) => <GameRow key={g.id} game={g} index={i} />)
            : PREORDERS.map(item => (
                <PreorderCard key={item.id} item={item}
                              inCart={!!cartItems.find(c => c.id === item.id)}
                              onAdd={addToCart}
                              onRemove={removeFromCart} />
              ))
          }
        </div>

        {/* Bottom bar */}
        <div style={{
          height: 34, flexShrink: 0,
          background: "rgba(255,255,255,0.03)",
          borderTop: `1px solid ${C.border}`,
          borderRadius: "0 0 20px 20px",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
        }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              width: i === 0 ? 18 : 6, height: 6,
              borderRadius: 3,
              background: i === 0 ? C.green : "rgba(255,255,255,0.12)",
              transition: "all 0.2s",
            }} />
          ))}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
